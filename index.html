<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mini-Game auf Base</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.9.0/dist/ethers.min.js"></script>

  <!-- Farcaster Frame Meta-Tags -->
  <meta property="fc:frame" content="vNext">
  <meta property="fc:frame:image" content="https://i.imgur.com/3X9Yk5J.png">
  <meta property="fc:frame:button:1" content="Play Mini-Game">
  <meta property="fc:frame:button:1:action" content="open">
  <meta property="fc:frame:button:1:target" content="https://dein-host.mein-mini-game">

  <style>
    body { font-family: Arial; text-align: center; margin: 40px; }
    #teddy { width: 100px; cursor: pointer; position: absolute; transition: top 0.2s, left 0.2s; }
    #score { font-size: 24px; margin-top: 20px; }
    #connectBtn { padding: 10px 20px; font-size: 18px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <h1>🐻 Mini-Game auf Base</h1>
  <button id="connectBtn">Wallet verbinden</button>
  <p id="status">Nicht verbunden</p>
  <p id="score">Score: 0</p>
  <img id="teddy" src="https://i.imgur.com/3X9Yk5J.png" style="top:200px; left:200px;">

  <script>
    const CONTRACT_ADDRESS = "0xf08c410c3bd38507ce38afcc36d1f1dbb3224a9f"; // Dein Contract
    const ABI = [
      {"inputs":[],"name":"incrementScore","outputs":[],"stateMutability":"nonpayable","type":"function"},
      {"inputs":[{"internalType":"address","name":"player","type":"address"}],"name":"getScore","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"}
    ];

    let provider, signer, contract;
    const connectBtn = document.getElementById("connectBtn");
    const status = document.getElementById("status");
    const scoreP = document.getElementById("score");
    const teddy = document.getElementById("teddy");

    async function connectWallet() {
      if(!window.ethereum) return alert("Bitte MetaMask installieren!");
      provider = new ethers.BrowserProvider(window.ethereum);
      await provider.send("eth_requestAccounts", []);
      signer = await provider.getSigner();
      contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
      const addr = await signer.getAddress();
      status.innerText = "Verbunden: " + addr;
      connectBtn.disabled = true;
      updateScore();
    }

    async function updateScore() {
      const addr = await signer.getAddress();
      const value = await contract.getScore(addr);
      scoreP.innerText = "Score: " + value;
    }

    async function hitTeddy() {
      const tx = await contract.incrementScore();
      scoreP.innerText = "Tx gesendet: " + tx.hash;
      await tx.wait();
      updateScore();
      moveTeddy();
    }

    function moveTeddy() {
      const maxX = window.innerWidth - 100;
      const maxY = window.innerHeight - 100;
      const x = Math.floor(Math.random() * maxX);
      const y = Math.floor(Math.random() * maxY);
      teddy.style.left = x + "px";
      teddy.style.top = y + "px";
    }

    connectBtn.onclick = connectWallet;
    teddy.onclick = hitTeddy;
  </script>
</body>
</html>
